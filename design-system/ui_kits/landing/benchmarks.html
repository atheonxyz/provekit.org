<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Provekit — Benchmarks</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--pk-canvas); color: var(--pk-ink); font-family: var(--pk-font-sans); }

  body { display: flex; flex-direction: column; align-items: center; padding-left: 88px; padding-right: 88px; }

  button, a.pk-btn { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="app"></div>
<script type="text/babel" src="Bloom.jsx"></script>

<script type="text/babel" src="BenchmarksMethodology.jsx"></script>
<script type="text/babel" src="BenchmarkDetail.jsx"></script>
<script type="text/babel" src="BenchmarksSummary.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <React.Fragment>
      <Header />
      <main className="stage" style={{ display: "flex", flexDirection: "column" }}>
        <Strip />
        <BenchmarksHero />
        <Strip />
        <BenchmarksMethodology />
        <Strip />
        <BenchmarkDetail index={0} />
        <Strip />
        <BenchmarkDetail index={1} />
        <Strip />
        <BenchmarkDetail index={2} />
        <Strip />
        <BenchmarksSummary />
        <Strip />
        <Footer />

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</html>
