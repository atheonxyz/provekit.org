<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Provekit — Landing</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--pk-canvas); color: var(--pk-ink); font-family: var(--pk-font-sans); }
  *, *::before, *::after { box-sizing: border-box; }
  body { display: flex; flex-direction: column; align-items: center; padding-left: var(--pk-side-pad, 48px); padding-right: var(--pk-side-pad, 48px); transition: padding 0.18s ease; }
  .stage { width: 1600px; max-width: 100%; }
  button { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="Bloom.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Panel.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="InstallSection.jsx"></script>
<script type="text/babel" src="FeatureCards.jsx"></script>
<script type="text/babel" src="PartnersSection.jsx"></script>
<script type="text/babel" src="BenchmarkSection.jsx"></script>
<script type="text/babel" src="FaqSection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sidePad": 88
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.body.style.setProperty("--pk-side-pad", t.sidePad + "px");
  }, [t.sidePad]);

  return (
    <React.Fragment>
      <Header />
      <main className="stage" style={{ display: "flex", flexDirection: "column" }}>
        <Hero />
        <Strip />
        <InstallSection />
        <Strip />
        <FeatureCards />
        <Strip />
        <PartnersSection />
        <Strip />
        <BenchmarkSection />
        <Strip />
        <FaqSection />
        <Strip />
        <Footer />
      </main>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Layout">
          <TweakSlider label="Side margin" value={t.sidePad} min={0} max={240} step={8}
            onChange={(v) => setTweak("sidePad", v)} unit="px" />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
