<html lang="en">

<title>Provekit — Benchmarks</title>

<template id="__bundler_thumbnail" data-bg-color="#F8FEFF">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="b" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#0D74FF" stop-opacity="1"/>
        <stop offset="100%" stop-color="#A2D0FC" stop-opacity="0.6"/>
      </linearGradient>
    </defs>
    <g transform="translate(360 220)">
      <rect x="0"   y="240" width="120" height="120" fill="url(#b)" opacity="0.35"/>
      <rect x="180" y="120" width="120" height="240" fill="url(#b)" opacity="0.55"/>
      <rect x="360" y="0"   width="120" height="360" fill="url(#b)"/>
      <line x1="-20" y1="360" x2="500" y2="360" stroke="#2D2D2B" stroke-width="4"/>
    </g>
  </svg>
</template>

<meta name="ext-resource-dependency" content="../../assets/grain-texture.png" data-resource-id="grainTexture" />

<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--pk-canvas); color: var(--pk-ink); font-family: var(--pk-font-sans); }

  body { display: flex; flex-direction: column; align-items: center; padding-left: 88px; padding-right: 88px; }

<script type="text/babel">
function App() {
  return (
    <React.Fragment>
      <Header />
      <main className="stage" style={{ display: "flex", flexDirection: "column" }}>
        <Strip />
        <BenchmarksHero />
        <Strip />
        <BenchmarksMethodology />
        <Strip />
