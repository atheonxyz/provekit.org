<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:24px 32px;}
  .code{display:flex;flex-direction:column;border:2px solid var(--pk-line);background:#fff;}
  .top{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--pk-line);}
  .lbl{padding:14px 24px;font:400 18px/1 var(--pk-font-mono);letter-spacing:0.02em;color:var(--pk-mute);}
  .copy{width:56px;height:56px;border-left:1px solid var(--pk-line);display:flex;align-items:center;justify-content:center;color:var(--pk-mute);}
  .body{padding:20px 24px;font:400 22px/1 var(--pk-font-mono);letter-spacing:0.02em;color:var(--pk-ink);}
</style></head>
<body><div class="wrap">
  <div class="code">
    <div class="top"><div class="lbl">BASH</div><div class="copy">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11"/><path d="M5 15V5a1 1 0 0 1 1-1h10"/></svg>
    </div></div>
    <div class="body">cargo install provekit-cli</div>
  </div>
</div></body></html>
