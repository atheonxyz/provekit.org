<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:0;height:200px;position:relative;overflow:hidden;}
  .grid{position:absolute;inset:0;}
  .v{position:absolute;top:0;bottom:0;width:1px;background:#EEF7FF;}
  .h{position:absolute;left:0;right:0;height:1px;background:#EEF7FF;}
  .dash{position:absolute;border-top:2px dashed #EEF7FF;}
  .dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#EEF7FF;}
  .lbl{position:absolute;top:10px;left:14px;font:400 11px/1 var(--pk-font-mono);text-transform:uppercase;letter-spacing:0.04em;color:var(--pk-mute);}
</style></head>
<body><div class="wrap">
  <div class="lbl">Construction lines · 1–2px dashed cyan w/ vertex dots</div>
  <div class="grid">
    <div class="v" style="left:80px;"></div>
    <div class="v" style="left:300px;"></div>
    <div class="v" style="left:540px;"></div>
    <div class="h" style="top:60px;"></div>
    <div class="h" style="top:140px;"></div>
    <div class="dash" style="left:80px;top:60px;width:220px;transform:rotate(20deg);transform-origin:left;"></div>
    <div class="dash" style="left:300px;top:140px;width:240px;transform:rotate(-18deg);transform-origin:left;"></div>
    <div class="dot" style="left:76px;top:56px;"></div>
    <div class="dot" style="left:296px;top:56px;"></div>
    <div class="dot" style="left:296px;top:136px;"></div>
    <div class="dot" style="left:536px;top:136px;"></div>
  </div>
</div></body></html>
