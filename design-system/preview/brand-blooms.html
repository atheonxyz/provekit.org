<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:18px 28px;display:flex;gap:18px;align-items:center;}
  .tile{flex:1;height:200px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#fff;border:1px solid var(--pk-line);}
  .disc{position:absolute;border-radius:50%;filter:blur(40px);}
  .a .disc1{width:170px;height:170px;background:#A2D0FC;left:-20px;top:20px;}
  .a .disc2{width:150px;height:150px;background:#FFE5C6;right:-20px;bottom:-10px;}
  .b .disc1{width:170px;height:170px;background:#FF9AA0;left:25%;top:-25px;}
  .b .disc2{width:130px;height:130px;background:#FDCC91;right:-10px;bottom:-25px;}
  .c .disc1{width:180px;height:180px;background:rgba(0,190,255,0.65);left:-10px;bottom:-25px;}
  .c .disc2{width:120px;height:120px;background:#DE00FF;opacity:0.25;right:20px;top:5px;}
  .shape{position:relative;width:120px;height:120px;color:rgba(255,255,255,0.55);}
  .shape img{width:100%;height:100%;display:block;}
  .lbl{position:absolute;top:8px;left:10px;font:400 11px/1 var(--pk-font-mono);text-transform:uppercase;letter-spacing:0.04em;color:var(--pk-mute);z-index:2;}
</style></head>
<body><div class="wrap">

  <div class="tile a">
    <span class="lbl">Cyan / Cream</span>
    <div class="disc disc1"></div><div class="disc disc2"></div>
    <div class="shape"><img src="../assets/shape-hexagon.svg"/></div>
  </div>

  <div class="tile b">
    <span class="lbl">Pink / Orange</span>
    <div class="disc disc1"></div><div class="disc disc2"></div>
    <div class="shape"><img src="../assets/shape-star.svg"/></div>
  </div>

  <div class="tile c">
    <span class="lbl">Cyan-hot / Magenta</span>
    <div class="disc disc1"></div><div class="disc disc2"></div>
    <div class="shape"><img src="../assets/shape-diamond.svg"/></div>
  </div>

</div></body></html>
