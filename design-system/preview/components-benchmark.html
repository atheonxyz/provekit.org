<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);font-family:var(--pk-font-sans);}
  .wrap{padding:18px 28px;display:flex;flex-direction:column;gap:14px;}
  .chips{display:flex;gap:14px;}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--pk-line);font:400 14px/1 var(--pk-font-mono);letter-spacing:0.02em;text-transform:uppercase;}
  .chip i{display:inline-block;width:10px;height:10px;}
  .bars{display:flex;flex-direction:column;gap:10px;}
  .bar{display:flex;align-items:center;gap:10px;font:400 12px/1 var(--pk-font-mono);text-transform:uppercase;}
  .bar i{display:block;height:14px;}
  .bar span{min-width:80px;text-align:right;}
</style></head>
<body><div class="wrap">
  <div class="chips">
    <div class="chip"><i style="background:#DE00FF;"></i>TOOLKIT 1</div>
    <div class="chip"><i style="background:#E91900;"></i>TOOLKIT 2</div>
    <div class="chip"><i style="background:#0D74FF;"></i>PROVEKIT</div>
  </div>
  <div class="bars">
    <div class="bar"><i style="width:18%;background:#DE00FF;"></i><span>METRIC 1</span></div>
    <div class="bar"><i style="width:46%;background:#E91900;"></i><span>METRIC 2</span></div>
    <div class="bar"><i style="width:74%;background:#0D74FF;"></i><span>METRIC 3</span></div>
  </div>
</div></body></html>
