<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:14px;}
  .spec{display:flex;align-items:baseline;gap:18px;}
  .meta{font:400 11px/1 var(--pk-font-mono);letter-spacing:0.04em;text-transform:uppercase;color:var(--pk-mute);min-width:180px;}
  .a{font:500 56px/1 var(--pk-font-sans);letter-spacing:-0.02em;}
  .b{font:300 56px/1 var(--pk-font-sans);letter-spacing:-0.02em;}
</style></head>
<body><div class="wrap">
  <div class="spec"><span class="meta">Outfit · 500</span><span class="a">Client-side zero-knowledge</span></div>
  <div class="spec"><span class="meta">Outfit · 300</span><span class="b">Excels in every aspect</span></div>
</div></body></html>
