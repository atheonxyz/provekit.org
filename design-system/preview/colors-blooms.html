<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Provekit — Pastel blooms</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:#fff; font-family: var(--pk-font-sans); color: var(--pk-ink); }
  .wrap { padding: 28px 32px; display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:10px; align-items:stretch; }
  .sw  { flex:1; height:78px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; border:1px solid var(--pk-line); }
  .sw .name { font: 400 12px/1 var(--pk-font-mono); letter-spacing:0.04em; text-transform:uppercase; }
  .sw .hex  { font: 400 11px/1.4 var(--pk-font-mono); opacity:0.75; }
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#FDCC91;"><div class="name">bloom-orange</div><div class="hex">#FDCC91</div></div>
    <div class="sw" style="background:#FFE5C6;"><div class="name">bloom-orange-2</div><div class="hex">#FFE5C6</div></div>
    <div class="sw" style="background:#FF9AA0;"><div class="name">bloom-pink</div><div class="hex">#FF9AA0</div></div>
    <div class="sw" style="background:#FFDEE7;"><div class="name">bloom-pink-2</div><div class="hex">#FFDEE7</div></div>
  </div>
  <div class="row">
    <div class="sw" style="background:#F9C7C0;"><div class="name">bloom-coral</div><div class="hex">#F9C7C0</div></div>
    <div class="sw" style="background:#A2D0FC;"><div class="name">bloom-cyan</div><div class="hex">#A2D0FC</div></div>
    <div class="sw" style="background:rgba(0,190,255,0.9);"><div class="name">bloom-cyan-hot</div><div class="hex">rgba(0,190,255,.9)</div></div>
    <div class="sw" style="background:#00FFF2;"><div class="name">bloom-cyan-2</div><div class="hex">#00FFF2</div></div>
  </div>
</div>
</body></html>
