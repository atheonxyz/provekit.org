<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Provekit — Toolkit chart colors</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:#fff; font-family: var(--pk-font-sans); color: var(--pk-ink); }
  .wrap { padding: 28px 32px; display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:10px; align-items:stretch; }
  .sw  { flex:1; height:64px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; border:1px solid var(--pk-line); }
  .sw .name { font: 400 12px/1 var(--pk-font-mono); letter-spacing:0.04em; text-transform:uppercase; color:#fff; }
  .sw .hex  { font: 400 11px/1.4 var(--pk-font-mono); color:rgba(255,255,255,0.85); }
  .bars { display:flex; flex-direction:column; gap:6px; }
  .bar  { display:flex; align-items:center; gap:8px; font: 400 11px/1 var(--pk-font-mono); text-transform:uppercase; letter-spacing:0.04em; color:var(--pk-ink); }
  .bar i { display:block; height:14px; }
  .lbl  { width:80px; }
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#DE00FF;"><div class="name">toolkit-1</div><div class="hex">#DE00FF</div></div>
    <div class="sw" style="background:#E91900;"><div class="name">toolkit-2</div><div class="hex">#E91900</div></div>
    <div class="sw" style="background:#0D74FF;"><div class="name">toolkit-3 / brand</div><div class="hex">#0D74FF</div></div>
  </div>
  <div class="bars">
    <div class="bar"><span class="lbl">METRIC 1</span><i style="width:18%;background:#DE00FF;"></i></div>
    <div class="bar"><span class="lbl">METRIC 2</span><i style="width:48%;background:#E91900;"></i></div>
    <div class="bar"><span class="lbl">METRIC 3</span><i style="width:78%;background:#0D74FF;"></i></div>
  </div>
</div>
</body></html>
