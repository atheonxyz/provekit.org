<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:center;gap:16px;}
  .meta{font:400 11px/1 var(--pk-font-mono);letter-spacing:0.04em;text-transform:uppercase;color:var(--pk-mute);min-width:170px;}
  .m{font:400 22px/1 var(--pk-font-mono);letter-spacing:0.02em;text-transform:uppercase;}
  .tab{display:inline-flex;align-items:center;padding:10px 20px;border:1px solid var(--pk-line);font:400 18px/1 var(--pk-font-mono);letter-spacing:0.02em;text-transform:uppercase;}
  .tab.b{background:#0D74FF;color:#fff;border-color:#0D74FF;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">Geist Mono · 24</span><span class="m">INTRODUCING PROVEKIT</span></div>
  <div class="row"><span class="meta">As a tab</span><span class="tab">CORE FEATURES</span><span class="tab b">DOCS →</span></div>
  <div class="row"><span class="meta">Tracking · +0.02em · UPPER</span><span class="m" style="font-size:18px;">cargo install provekit-cli</span></div>
