<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:22px 32px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:baseline;gap:16px;}
  .meta{font:400 11px/1 var(--pk-font-mono);letter-spacing:0.04em;text-transform:uppercase;color:var(--pk-mute);min-width:170px;}
  .h3{font:500 28px/1 var(--pk-font-sans);letter-spacing:-0.02em;color:var(--pk-ink-alt);}
  .body{font:300 22px/1.33 var(--pk-font-sans);color:var(--pk-mute);}
  .body-ink{font:300 22px/1.33 var(--pk-font-sans);color:var(--pk-ink);}
  .h1{font:300 40px/1 var(--pk-font-sans);letter-spacing:-0.02em;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">Outfit · 500 · 28</span><span class="h3">FAQ question style</span></div>
  <div class="row"><span class="meta">Outfit · 300 · 48</span><span class="h1">+36% Faster</span></div>
  <div class="row"><span class="meta">Outfit · 300 · 24</span><span class="body-ink">Provekit is a lightweight, modular ZK toolkit.</span></div>
  <div class="row"><span class="meta">Outfit · 300 · 24 · mute</span><span class="body">Designed for client-side proving.</span></div>
</div></body></html>
