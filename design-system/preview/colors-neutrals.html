<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Provekit — Lines + neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:#fff; font-family: var(--pk-font-sans); color: var(--pk-ink); }
  .wrap { padding: 28px 32px; display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:10px; align-items:stretch; }
  .sw  { flex:1; height:78px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; border:1px solid var(--pk-line); }
  .sw .name { font: 400 12px/1 var(--pk-font-mono); letter-spacing:0.04em; text-transform:uppercase; }
  .sw .hex  { font: 400 11px/1.4 var(--pk-font-mono); opacity:0.7; }
  .dark .name,.dark .hex { color:#fff; }
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#D1F5FF;"><div class="name">line</div><div class="hex">#D1F5FF</div></div>
    <div class="sw" style="background:#EEF7FF;"><div class="name">line-soft</div><div class="hex">#EEF7FF</div></div>
    <div class="sw" style="background:#BCEEFF;"><div class="name">line-mid</div><div class="hex">#BCEEFF</div></div>
    <div class="sw" style="background:#949494;"><div class="name">mute</div><div class="hex">#949494</div></div>
    <div class="sw dark" style="background:#808080;"><div class="name">mute-2</div><div class="hex">#808080</div></div>
    <div class="sw" style="background:#B7B7B7;"><div class="name">mute-3</div><div class="hex">#B7B7B7</div></div>
  </div>
</div>
</body></html>
