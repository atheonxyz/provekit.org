<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Provekit — Colors / Brand</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background: var(--pk-canvas); font-family: var(--pk-font-sans); color: var(--pk-ink); }
  .wrap { padding: 28px 32px; display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:10px; align-items:stretch; }
  .sw  { flex:1; height:78px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; border:1px solid var(--pk-line); }
  .sw .name { font: 400 12px/1 var(--pk-font-mono); letter-spacing:0.04em; text-transform:uppercase; }
  .sw .hex  { font: 400 11px/1.4 var(--pk-font-mono); opacity:0.7; }
  .dark .name, .dark .hex { color:#fff; }
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw dark" style="background:#0D74FF;"><div class="name">brand</div><div class="hex">#0D74FF</div></div>
    <div class="sw" style="background:#A2D0FC;"><div class="name">brand-ink</div><div class="hex">#A2D0FC</div></div>
    <div class="sw dark" style="background:#2D2D2B;"><div class="name">ink</div><div class="hex">#2D2D2B</div></div>
    <div class="sw" style="background:#F8FEFF;"><div class="name">canvas</div><div class="hex">#F8FEFF</div></div>
    <div class="sw" style="background:#FFFFFF;"><div class="name">surface</div><div class="hex">#FFFFFF</div></div>
  </div>
</div>
</body></html>
