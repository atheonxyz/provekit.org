<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--pk-canvas);color:var(--pk-ink);}
  .wrap{padding:24px 32px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .tab{display:inline-flex;align-items:center;padding:12px 24px;height:47px;border:1px solid var(--pk-line);background:#fff;font:400 20px/1 var(--pk-font-mono);letter-spacing:0.02em;text-transform:uppercase;color:#2D2D2B;}
  .tab.brand{background:#0D74FF;color:#fff;border-color:#0D74FF;}
  .lbl{font:400 11px/1 var(--pk-font-mono);text-transform:uppercase;color:var(--pk-mute);width:100%;letter-spacing:0.04em;}
</style></head>
<body><div class="wrap">
  <div class="lbl">Section tabs — top-left of each panel</div>
  <span class="tab brand">INTRODUCING PROVEKIT</span>
  <span class="tab">CORE FEATURES</span>
  <span class="tab">BENCHMARKS</span>
  <span class="tab">FREQUENTLY ASKED QUESTIONS</span>
</div></body></html>
