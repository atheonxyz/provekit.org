<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:18px 28px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:14px;}
  .meta{font:400 11px/1 var(--pk-font-mono);letter-spacing:0.04em;text-transform:uppercase;color:var(--pk-mute);min-width:140px;}
  .box{height:32px;background:#EEF7FF;border:1px dashed var(--pk-line);}
  .b16{width:16px;}.b24{width:24px;}.b48{width:48px;}.b72{width:72px;}.b80{width:80px;}.b160{width:160px;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">gap-stack · 16</span><div class="box b16"></div></div>
  <div class="row"><span class="meta">gap-section · 48</span><div class="box b48"></div></div>
  <div class="row"><span class="meta">strip · 80</span><div class="box b80"></div></div>
  <div class="row"><span class="meta">gutter · 160</span><div class="box b160"></div></div>
</div></body></html>
