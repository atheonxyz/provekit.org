<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border:1px solid var(--pk-line);height:76px;box-sizing:border-box;}
  .left{display:flex;align-items:center;gap:10px;min-width:0;}
  .left img{height:18px;display:block;max-width:340px;filter:brightness(0);}
  .right{display:flex;align-items:center;}
  .docs{background:#0D74FF;color:#fff;padding:0 18px;height:52px;box-sizing:border-box;display:flex;align-items:center;gap:10px;font:400 18px/1 var(--pk-font-mono);letter-spacing:0.02em;}
  .menu{width:52px;height:52px;border:1px solid var(--pk-line);display:flex;align-items:center;justify-content:center;}
  .menu i{display:block;width:22px;height:2px;background:var(--pk-ink);box-shadow:0 -7px 0 var(--pk-ink), 0 7px 0 var(--pk-ink);}
  .arrow{display:inline-block;width:14px;border-top:2px solid currentColor;position:relative;}
  .arrow::after{content:"";position:absolute;right:-1px;top:-4px;width:7px;height:7px;border-top:2px solid currentColor;border-right:2px solid currentColor;transform:rotate(45deg);}
</style></head>
<body><div class="nav">
  <div class="left"><img src="../assets/wordmark-original.svg" alt="Provekit"/></div>
  <div class="right"><div class="docs">DOCS <span class="arrow"></span></div><div class="menu"><i></i></div></div>
</div></body></html>
