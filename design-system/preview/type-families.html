<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:24px 32px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .meta{font:400 11px/1 var(--pk-font-mono);letter-spacing:0.04em;text-transform:uppercase;color:var(--pk-mute);}
  .v2{font:500 80px/1 var(--pk-font-sans);letter-spacing:-0.02em;}
  .v3{font:400 64px/1 var(--pk-font-mono);letter-spacing:0.02em;}
  .v4{font:300 64px/1 var(--pk-font-sans);}
  .v5{font:500 64px/1 var(--pk-font-grotesk);}
</style></head>
<body><div class="wrap">
  <div class="col"><span class="meta">Outfit 500</span><span class="v2">Aa</span></div>
  <div class="col"><span class="meta">Outfit 300</span><span class="v4">Aa</span></div>
  <div class="col"><span class="meta">Geist Mono</span><span class="v3">Aa</span></div>
  <div class="col"><span class="meta">Host Grotesk</span><span class="v5">Aa</span></div>
</div></body></html>
