<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:18px 28px;display:flex;gap:14px;}
  .tile{flex:1;display:flex;flex-direction:column;gap:8px;}
  .demo{height:80px;background:#fff;}
  .b1{border:1px solid var(--pk-line);}
  .b2{border:2px solid var(--pk-line);}
  .b2m{border:2px solid var(--pk-line-mid);}
  .none{box-shadow:none;border:1px solid var(--pk-line);background:linear-gradient(45deg,#fff 49%,var(--pk-line) 49%,var(--pk-line) 51%,#fff 51%);}
  .lbl{font:400 11px/1 var(--pk-font-mono);text-transform:uppercase;color:var(--pk-mute);letter-spacing:0.04em;}
</style></head>
<body><div class="wrap">
  <div class="tile"><div class="demo b1"></div><div class="lbl">1px · line · #D1F5FF</div></div>
  <div class="tile"><div class="demo b2"></div><div class="lbl">2px · line</div></div>
  <div class="tile"><div class="demo b2m"></div><div class="lbl">2px · line-mid · #BCEEFF</div></div>
  <div class="tile"><div class="demo none"></div><div class="lbl">no shadow · radius 0</div></div>
</div></body></html>
