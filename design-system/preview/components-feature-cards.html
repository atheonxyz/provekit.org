<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:18px 32px;display:flex;gap:18px;align-items:center;}
  .card{width:200px;height:280px;border:2px solid var(--bc, #BCEEFF);background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .card.orange{--bc:#FFE5C6;}
  .card.pink  {--bc:#FFDEE7;}
  .icon{flex:1;position:relative;overflow:hidden;background:#fff;}
  .icon img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .meta{display:flex;align-items:stretch;border-top:2px solid var(--bc, #BCEEFF);height:48px;}
  .num{width:48px;display:flex;align-items:center;justify-content:center;font:400 16px/1 var(--pk-font-mono);border-right:1px solid var(--bc, #BCEEFF);}
  .name{flex:1;display:flex;align-items:center;padding:0 14px;font:400 16px/1 var(--pk-font-mono);letter-spacing:0.02em;text-transform:uppercase;}
</style></head>
<body><div class="wrap">

  <div class="card">
    <div class="icon"><img src="../assets/feature-modularity.png" alt="" /></div>
    <div class="meta"><div class="num">1</div><div class="name">Modularity</div></div>
  </div>

  <div class="card orange">
    <div class="icon"><img src="../assets/feature-mobile.png?v=2" alt="" /></div>
    <div class="meta"><div class="num">2</div><div class="name">Mobile friendly</div></div>
  </div>

  <div class="card pink">
    <div class="icon"><img src="../assets/feature-lightweight.png" alt="" /></div>
    <div class="meta"><div class="num">3</div><div class="name">Light weight</div></div>
  </div>

</div></body></html>
