<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:18px 28px;display:flex;gap:14px;align-items:center;justify-content:center;}
  .tile{width:170px;height:170px;border:1px solid var(--pk-line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
  .tile img{width:96px;height:96px;}
  .name{font:400 11px/1 var(--pk-font-mono);text-transform:uppercase;letter-spacing:0.04em;color:var(--pk-mute);}
</style></head>
<body><div class="wrap">
  <div class="tile"><img src="../assets/shape-hexagon.svg"/><div class="name">Hexagon flower</div></div>
  <div class="tile"><img src="../assets/shape-octagon.svg"/><div class="name">Nested octagon</div></div>
  <div class="tile"><img src="../assets/shape-star.svg"/><div class="name">Interlocking star</div></div>
  <div class="tile"><img src="../assets/shape-diamond.svg"/><div class="name">Diamond</div></div>
</div></body></html>
