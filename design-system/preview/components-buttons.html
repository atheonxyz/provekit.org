<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--pk-ink);}
  .wrap{padding:24px 32px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:8px 16px;height:48px;font:400 18px/1 var(--pk-font-mono);letter-spacing:0.02em;text-transform:uppercase;border:0;cursor:pointer;}
  .p{background:#0D74FF;color:#fff;}
  .s{background:#F1F1F1;color:#2D2D2B;}
  .g{background:#fff;color:#2D2D2B;border:1px solid var(--pk-line);}
  .arrow{display:inline-block;width:18px;border-top:2px solid currentColor;position:relative;}
  .arrow::after{content:"";position:absolute;right:-1px;top:-5px;width:8px;height:8px;border-top:2px solid currentColor;border-right:2px solid currentColor;transform:rotate(45deg);}
  .ic{display:inline-flex;width:18px;align-items:center;justify-content:center;font-family:var(--pk-font-mono);}
</style></head>
<body><div class="wrap">
  <button class="btn p">EXPLORE DOCS <span class="arrow"></span></button>
  <button class="btn s">VISIT REPO <span class="ic">{ }</span></button>
  <button class="btn g">DOCS</button>
  <button class="btn p">VISIT GITHUB <span class="arrow"></span></button>
</div></body></html>
